<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        html, body { margin: 0; height: 100%; }
        flow-it { display: block; width: 100%; height: 100%; }

        .flow__node.light {
            background: #fff;
            color: #222;
            border: 1px solid #9ca3af;
            border-radius: 6px;
            padding: 8px 14px;
        }
        .flow__node.dark {
            background: #1f2937;
            color: #f9fafb;
            border: 1px solid #4b5563;
            border-radius: 6px;
            padding: 8px 14px;
        }

        flow-panel button {
            padding: 6px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background: white;
            font-size: 13px;
            cursor: pointer;
        }
        flow-panel button:hover { background: #f1f5f9; }
    </style>
    <title>Basic Example</title>
</head>
<body>
<flow-it id="my-flow" nodes-draggable elements-selectable fit-view-on-init>
    <flow-background></flow-background>
    <flow-minimap></flow-minimap>
    <flow-controls></flow-controls>

    <flow-panel id="controls-panel" position="top-right" style="display:flex; gap:5px;">
        <button id="btn-reset">reset viewport</button>
        <button id="btn-pos">change pos</button>
        <button id="btn-class">toggle class</button>
        <button id="btn-log">toObject</button>
    </flow-panel>
</flow-it>

<script type="module" src="../src/core/main.ts"></script>
<script type="module" src="../src/minimap/index.ts"></script>
<script type="module" src="../src/background/index.ts"></script>
<script type="module" src="../src/controls/index.ts"></script>

<script type="module">
    customElements.whenDefined('flow-it').then(() => {
        const store = document.querySelector('#my-flow').getStore()

        store.setMinZoom(0.2)
        store.setMaxZoom(2)

        const nodes = [
            { id: '1', type: 'input',   data: { label: 'Node 1' }, position: { x: 250, y: 5   }, class: 'light' },
            { id: '2', type: 'default', data: { label: 'Node 2' }, position: { x: 100, y: 100 }, class: 'light' },
            { id: '3', type: 'default', data: { label: 'Node 3' }, position: { x: 400, y: 100 }, class: 'light' },
            { id: '4', type: 'default', data: { label: 'Node 4' }, position: { x: 400, y: 200 }, class: 'light' },
        ]

        const edges = [
            { id: 'e1-2', source: '1', target: '2', animated: true },
            { id: 'e1-3', source: '1', target: '3' },
        ]

        store.addNodes(nodes)

        store.onNodesInitialized(() => {
            store.addEdges(edges)
        })

        // Auto-add edges when user draws connections
        store.hooks.connect.on((connection) => {
            store.addEdges([connection])
        })

        // Reset viewport
        document.getElementById('btn-reset').addEventListener('click', () => {
            store.setViewport({ x: 0, y: 0, zoom: 1 })
        })

        // Randomise positions
        document.getElementById('btn-pos').addEventListener('click', () => {
            const changes = store.nodes.map(node => ({
                id: node.id,
                type: 'position',
                position: {
                    x: Math.random() * 400,
                    y: Math.random() * 400,
                },
            }))
            store.applyNodeChanges(changes)
        })

        // Toggle light/dark class — update via store so state stays in sync
        document.getElementById('btn-class').addEventListener('click', () => {
            store.nodes.forEach(node => {
                store.updateNode(node.id, {
                    class: node.class === 'light' ? 'dark' : 'light',
                })
            })
        })

        // Log graph snapshot
        document.getElementById('btn-log').addEventListener('click', () => {
            console.log(store.toObject())
        })
    })
</script>
</body>
</html>
