<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        html, body { margin: 0; height: 100%; font-family: sans-serif; }

        #demo-selector {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 6px 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        #demo-selector label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            white-space: nowrap;
        }

        #demo-selector select {
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 4px 8px;
            background: white;
            color: #111827;
            cursor: pointer;
            outline: none;
        }

        #demo-selector select:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
        }

        #demo-frame {
            position: fixed;
            inset: 0;
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
    <title>FlowKit — Demo</title>
</head>
<body>

<div id="demo-selector">
    <label for="demo-select">📦 Demo:</label>
    <select id="demo-select">
        <option value="./examples/basic.html">Basic Nodes</option>
        <option value="./examples/drag-and-drop.html">Drag & Drop Nodes</option>
        <option value="./examples/customisation.html">Custom styling</option>
    </select>
</div>

<iframe id="demo-frame" src="./examples/basic.html"></iframe>

<script>
    const select = document.getElementById('demo-select');
    const frame = document.getElementById('demo-frame');

    // Restore last selected demo from session
    const saved = sessionStorage.getItem('selected-demo');
    if (saved) {
        select.value = saved;
        frame.src = saved;
    }

    select.addEventListener('change', () => {
        const url = select.value;
        sessionStorage.setItem('selected-demo', url);
        frame.src = url;
    });
</script>
</body>
</html>
